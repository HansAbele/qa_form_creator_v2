services:
  db:
    image: postgres:16-alpine
    container_name: qa_form_creator_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password
      POSTGRES_DB: qa_form_creator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d qa_form_creator"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
