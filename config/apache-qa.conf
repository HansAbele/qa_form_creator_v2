# ─── QA Form Creator — Apache Reverse Proxy ─────────────
# /etc/apache2/sites-available/qa-form-creator.conf

# HTTP → HTTPS redirect
<VirtualHost *:80>
    ServerName qa.empresa.local
    ServerAlias 192.168.80.243

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# HTTPS Virtual Host
<VirtualHost *:443>
    ServerName qa.empresa.local
    ServerAlias 192.168.80.243

    # SSL Configuration (self-signed for intranet)
    SSLEngine on
    SSLCertificateFile /etc/ssl/qa-form-creator/cert.pem
    SSLCertificateKeyFile /etc/ssl/qa-form-creator/key.pem

    # Security headers
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"

    # Proxy headers for Auth.js
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Ssl "on"

    # Reverse proxy to Next.js app
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3000/$1 [P,L]

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/qa-form-creator-error.log
    CustomLog ${APACHE_LOG_DIR}/qa-form-creator-access.log combined
</VirtualHost>
