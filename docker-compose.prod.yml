services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: qa-form-creator:latest
    container_name: qa_form_creator_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DATABASE_URL=postgresql://qa_user:${DB_PASSWORD}@db:5432/qa_form_creator
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - AUTH_TRUST_HOST=true
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: qa_form_creator_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: qa_form_creator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d qa_form_creator"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
